<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CricketScore - Live Cloud Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            transition: background-color 0.2s, color 0.2s;
            overflow: hidden; 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-950 text-slate-900 dark:text-slate-50 h-svh w-screen flex flex-col selection:bg-emerald-500 selection:text-slate-950">

    <div class="w-full max-w-md mx-auto bg-white dark:bg-slate-900 h-full shadow-2xl flex flex-col relative border-x border-slate-200 dark:border-slate-800 pt-[env(safe-area-inset-top)] pb-[env(safe-area-inset-bottom)]">
        
        <header class="bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-emerald-500 flex items-center justify-center text-slate-950 font-bold text-lg shadow-lg shadow-emerald-500/20">
                    🏏
                </div>
                <div>
                    <h1 class="text-base font-bold tracking-tight bg-gradient-to-r from-emerald-500 to-teal-500 dark:from-emerald-400 dark:to-teal-400 bg-clip-text text-transparent">CricketScore</h1>
                    <p class="text-[10px] text-slate-500 dark:text-slate-400 font-medium tracking-wide uppercase">Live Cloud Arena</p>
                </div>
            </div>
            
            <div class="flex items-center gap-1.5">
                <button onclick="app.toggleFullScreen()" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition" title="Toggle Fullscreen">
                    <i data-lucide="maximize" id="fullscreen-icon" class="w-4 h-4 text-slate-600 dark:text-slate-300"></i>
                </button>
                <button onclick="app.switchView('settings')" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition">
                    <i data-lucide="settings" class="w-4 h-4 text-slate-600 dark:text-slate-300"></i>
                </button>
            </div>
        </header>

        <main id="view-container" class="flex-1 p-4 overflow-y-auto no-scrollbar"></main>

        <nav class="bg-white/95 dark:bg-slate-900/95 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 grid grid-cols-4 py-2.5 shadow-xl w-full">
            <button onclick="app.switchView('dashboard')" id="nav-dashboard" class="flex flex-col items-center gap-1 text-emerald-600 dark:text-emerald-400">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                <span class="text-[10px] font-medium">Dashboard</span>
            </button>
            <button onclick="app.switchView('history')" id="nav-history" class="flex flex-col items-center gap-1 text-slate-400">
                <i data-lucide="history" class="w-5 h-5"></i>
                <span class="text-[10px] font-medium">Ledger</span>
            </button>
            <button onclick="app.switchView('tournaments')" id="nav-tournaments" class="flex flex-col items-center gap-1 text-slate-400">
                <i data-lucide="trophy" class="w-5 h-5"></i>
                <span class="text-[10px] font-medium">Leagues</span>
            </button>
            <button onclick="app.switchView('settings')" id="nav-settings" class="flex flex-col items-center gap-1 text-slate-400">
                <i data-lucide="sliders-horizontal" class="w-5 h-5"></i>
                <span class="text-[10px] font-medium">Options</span>
            </button>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // Paste YOUR personal Firebase Configuration Object right here:
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL", 
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        class CricketApp {
            constructor() {
                this.tournaments = [];
                this.history = [];
                this.currentMatch = null;
                this.currentView = 'dashboard';
                this.themePreference = localStorage.getItem('cs_theme_mode') || 'system';

                this.applyThemeEngine();
                
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
                    if (this.themePreference === 'system') this.applyThemeEngine();
                });

                db.ref('cricket_hub/').on('value', (snapshot) => {
                    const cloudData = snapshot.val();
                    if (cloudData) {
                        this.tournaments = cloudData.tournaments || [];
                        this.history = cloudData.history || [];
                        this.currentMatch = cloudData.currentMatch || null;
                        this.render();
                    }
                });
            }

            toggleFullScreen() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.log(`Error enabling fullscreen: ${err.message}`);
                    });
                    document.getElementById('fullscreen-icon').setAttribute('data-lucide', 'minimize');
                } else {
                    document.exitFullscreen();
                    document.getElementById('fullscreen-icon').setAttribute('data-lucide', 'maximize');
                }
                lucide.createIcons();
            }

            setTheme(mode) {
                this.themePreference = mode;
                localStorage.setItem('cs_theme_mode', mode);
                this.applyThemeEngine();
                this.render();
            }

            applyThemeEngine() {
                const root = document.documentElement;
                if (this.themePreference === 'dark') root.classList.add('dark');
                else if (this.themePreference === 'light') root.classList.remove('dark');
                else {
                    if (window.matchMedia('(prefers-color-scheme: dark)').matches) root.classList.add('dark');
                    else root.classList.remove('dark');
                }
            }

            save() {
                db.ref('cricket_hub/').set({
                    tournaments: this.tournaments,
                    history: this.history,
                    currentMatch: this.currentMatch
                });
            }

            switchView(view) {
                this.currentView = view;
                document.querySelectorAll('nav button').forEach(btn => {
                    btn.classList.remove('text-emerald-600', 'dark:text-emerald-400');
                    btn.classList.add('text-slate-400');
                });
                const activeNav = document.getElementById(`nav-${view}`);
                if (activeNav) {
                    activeNav.classList.remove('text-slate-400');
                    activeNav.classList.add('text-emerald-600', 'dark:text-emerald-400');
                }
                this.render();
            }

            render() {
                const container = document.getElementById('view-container');
                if(!container) return;
                container.innerHTML = '';
                
                if (this.currentView === 'dashboard') this.renderDashboard(container);
                else if (this.currentView === 'history') this.renderHistory(container);
                else if (this.currentView === 'tournaments') this.renderTournaments(container);
                else if (this.currentView === 'live-scoring') this.renderLiveScoring(container);
                else if (this.currentView === 'setup-match') this.renderSetupMatch(container);
                else if (this.currentView === 'settings') this.renderSettings(container);

                lucide.createIcons();
            }

            renderSettings(container) {
                const mode = this.themePreference;
                container.innerHTML = `
                    <div class="bg-slate-50 dark:bg-slate-800/40 border border-slate-200 dark:border-slate-800 rounded-xl p-4 space-y-4">
                        <h2 class="text-base font-bold flex items-center gap-2">
                            <i data-lucide="palette" class="text-emerald-500"></i> App Preferences
                        </h2>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wide">Display Mode</label>
                            <div class="grid grid-cols-3 gap-2">
                                <button onclick="app.setTheme('light')" class="py-2.5 px-3 rounded-xl border text-xs font-bold flex flex-col items-center gap-1.5 transition ${mode==='light' ? 'bg-emerald-500 border-emerald-500 text-slate-950' : 'bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300'}">
                                    <i data-lucide="sun" class="w-4 h-4"></i> Light
                                </button>
                                <button onclick="app.setTheme('dark')" class="py-2.5 px-3 rounded-xl border text-xs font-bold flex flex-col items-center gap-1.5 transition ${mode==='dark' ? 'bg-emerald-500 border-emerald-500 text-slate-950' : 'bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300'}">
                                    <i data-lucide="moon" class="w-4 h-4"></i> Dark
                                </button>
                                <button onclick="app.setTheme('system')" class="py-2.5 px-3 rounded-xl border text-xs font-bold flex flex-col items-center gap-1.5 transition ${mode==='system' ? 'bg-emerald-500 border-emerald-500 text-slate-950' : 'bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300'}">
                                    <i data-lucide="monitor" class="w-4 h-4"></i> System
                                </button>
                            </div>
                        </div>
                    </div>`;
            }

            renderDashboard(container) {
                let currentMatchCard = `
                    <div class="bg-slate-50 dark:bg-slate-800/40 border border-slate-200 dark:border-slate-800 rounded-xl p-6 text-center">
                        <i data-lucide="swords" class="w-8 h-8 text-slate-400 dark:text-slate-50
