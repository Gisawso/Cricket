<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CricketScore</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: sans-serif; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .no-sb::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-950 text-slate-900 dark:text-slate-50 h-svh w-screen flex flex-col">

    <div class="w-full max-w-md mx-auto bg-white dark:bg-slate-900 h-full flex flex-col relative border-x border-slate-200 dark:border-slate-800 pt-[env(safe-area-inset-top)] pb-[env(safe-area-inset-bottom)]">
        
        <header class="border-b border-slate-200 dark:border-slate-800 px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-xl">🏏</span>
                <div>
                    <h1 class="text-base font-bold bg-gradient-to-r from-emerald-500 to-teal-500 bg-clip-text text-transparent">CricketScore</h1>
                </div>
            </div>
            <div class="flex gap-1">
                <button onclick="app.toggleFS()" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800"><i data-lucide="maximize" id="fs-icon" class="w-4 h-4"></i></button>
                <button onclick="app.switchView('settings')" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800"><i data-lucide="settings" class="w-4 h-4"></i></button>
            </div>
        </header>

        <main id="view-container" class="flex-1 p-4 overflow-y-auto no-sb"></main>

        <nav class="border-t border-slate-200 dark:border-slate-800 grid grid-cols-4 py-2 shadow-xl">
            ${['dashboard', 'history', 'tournaments', 'settings'].map(v => `
                <button onclick="app.switchView('${v}')" id="nav-${v}" class="flex flex-col items-center text-slate-400">
                    <i data-lucide="${v==='dashboard'?'layout-dashboard':v==='history'?'history':v==='tournaments'?'trophy':'sliders-horizontal'}" class="w-5 h-5"></i>
                    <span class="text-[10px] capitalize">${v}</span>
                </button>
            `).join('')}
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
